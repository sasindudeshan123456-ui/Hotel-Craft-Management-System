<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Supplier - HotelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: all 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: var(--mesh-gradient);
            background-size: 200% 200%;
            animation: meshMove 15s ease infinite;
        }

        @keyframes meshMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .header {
            margin-bottom: 2.5rem;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            background: var(--grad-analytics);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2.5rem;
            border: 1px solid var(--border-sidebar);
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--card-shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-body);
            border: 1px solid var(--border-sidebar);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--nav-item-hover-bg);
        }

        .form-control option {
            background: #1a1b26;
            color: #ffffff;
            padding: 10px;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--grad-analytics);
            color: white;
            flex: 2;
        }

        .btn-cancel {
            background: var(--nav-item-hover-bg);
            color: var(--text-main);
            border: 1px solid var(--border-sidebar);
            flex: 1;
        }

        .btn-submit {
            background: var(--grad-analytics);
            color: white;
            flex: 2;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('suppliers')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/supplier_tabs :: supplier_tabs(${editMode ? 'suppliers' : 'add'})}"></div>
        <div class="header">
            <div>
                <h2 th:text="${editMode ? 'Edit Supplier' : 'Add New Supplier'}"
                    style="font-size: 2.25rem; font-weight: 800; background: var(--grad-analytics); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">
                    Add New Supplier</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;" th:text="${editMode ? 'Modify existing supplier details' : 'Register a new supplier to the system'}">Register a new supplier to the system</p>
            </div>
        </div>

        <div th:if="${error}"
            style="padding: 1rem 1.5rem; border-radius: 1rem; margin-bottom: 2rem; background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); display: flex; align-items: center; gap: 0.75rem;">
            <i data-lucide="alert-circle"></i>
            <span th:text="${error}"></span>
        </div>
        
        <div th:if="${success}"
            style="padding: 1rem 1.5rem; border-radius: 1rem; margin-bottom: 2rem; background: rgba(34, 197, 94, 0.1); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.2); display: flex; align-items: center; gap: 0.75rem;">
            <i data-lucide="check-circle"></i>
            <span th:text="${success}"></span>
        </div>

        <div class="form-card">
            <form th:action="${editMode ? '/suppliers/' + supplier.id + '/edit' : '/suppliers/new'}" th:object="${supplier}" method="POST">
                <div class="form-group">
                    <label for="name">Company Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="e.g. Acme Corp"
                        required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" th:field="*{category}" class="form-control"
                        placeholder="e.g. Kitchen Supplies" required>
                </div>
                <div class="form-group">
                    <label for="initials">Visual Initials (2 chars)</label>
                    <input type="text" id="initials" th:field="*{initials}" class="form-control" placeholder="AC"
                        maxlength="2" required>
                </div>
                <div class="form-group">
                    <label for="phone">Contact Phone</label>
                    <input type="text" id="phone" name="phone" class="form-control" th:value="${phone}" placeholder="+94 77 123 4567" required>
                </div>
                <div class="form-group">
                    <label for="address">Business Address</label>
                    <input type="text" id="address" name="address" class="form-control" th:value="${address}" placeholder="123 Supply Lane, Colombo" required>
                </div>
                <div class="form-group">
                    <label for="status">Initial Status</label>
                    <select id="status" th:field="*{status}" class="form-control">
                        <option value="ACTIVE">Active</option>
                        <option value="REVIEW">Under Review</option>
                    </select>
                </div>

                <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-sidebar);">
                    <h4 style="margin: 0 0 1rem 0; color: var(--accent-primary);">Account Credentials</h4>
                    <div class="form-group">
                        <label for="email">User Email (for Login)</label>
                        <input type="email" id="email" name="email" class="form-control" th:value="${email}" placeholder="supplier@example.com" required>
                    </div>
                    <div class="form-group" th:if="${!editMode}">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/suppliers" class="btn btn-cancel">Cancel</a>
                    <button type="submit" class="btn btn-submit" th:text="${editMode ? 'Update Supplier' : 'Create Supplier'}">Create Supplier</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        lucide.createIcons();
    </script>
</body>

</html>

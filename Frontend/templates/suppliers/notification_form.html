<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Notification - HotelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: var(--mesh-gradient);
            background-size: 200% 200%;
            animation: meshMove 15s ease infinite;
        }

        @keyframes meshMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header { margin-bottom: 2.5rem; }
        .header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            background: var(--grad-analytics);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2.5rem;
            border: 1px solid var(--border-sidebar);
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--card-shadow);
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-body);
            border: 1px solid var(--border-sidebar);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--grad-analytics); color: white; width: 100%; }
        .btn-secondary { background: var(--nav-item-hover-bg); color: var(--text-main); width: 100%; margin-top: 1rem; }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('suppliers')}"></div>

    <div class="main-content">
        <div class="header">
            <h2>Send Notification</h2>
        </div>

        <div class="form-card">
            <form th:action="@{/suppliers/notifications/new}" method="POST">
                <div class="form-group">
                    <label for="type">Alert Type</label>
                    <select id="type" name="type" class="form-control" required>
                        <option value="BLUE">Information (Blue)</option>
                        <option value="GREEN">Success (Green)</option>
                        <option value="AMBER">Warning (Amber)</option>
                        <option value="RED">Urgent (Red)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" class="form-control" placeholder="e.g. Price Update Required" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" rows="4" placeholder="Detailed message..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Send Notification</button>
                <a th:href="@{/suppliers}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        lucide.createIcons();
    </script>
</body>
</html>

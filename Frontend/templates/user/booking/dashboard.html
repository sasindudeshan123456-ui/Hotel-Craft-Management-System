<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HotelCraft</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Variables inherited from sidebar fragment */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--mesh-gradient);
            background-size: 200% 200%;
            animation: meshMove 15s ease infinite;
        }

        @keyframes meshMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .hero-section {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: 2rem;
        }

        .hero-background {
            display: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            /* Darker overlay for better text contrast in professional UI */
            z-index: 2;
        }

        [data-theme="light"] .overlay {
            background: rgba(255, 255, 255, 0.1);
            /* Lighter for Light Mode */
            backdrop-filter: brightness(0.9);
        }

        .welcome-container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInScale 1s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 1000px;
            width: 100%;
            padding: 2rem;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .welcome-title {
            font-size: 5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.04em;
            color: white;
            line-height: 1.1;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] .welcome-title {
            color: var(--accent-primary);
            text-shadow: none;
            letter-spacing: -0.02em;
        }

        .quick-actions {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .action-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 1.25rem 4rem;
            border-radius: 1.25rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.15rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        [data-theme="light"] .action-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.6);
            filter: brightness(1.1);
        }

        .action-btn i {
            width: 22px;
            height: 22px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <div class="main-content">
        <div class="hero-section">
            <div th:replace="~{fragments/nav_tabs :: nav_tabs('dashboard')}"></div>
            <div class="welcome-container">
                <h1 class="welcome-title">
                    Welcome to HotelCraft
                </h1>

                <div class="quick-actions">
                    <a th:href="@{/store}" class="action-btn">
                        Visit Items Store
                    </a>
                </div>
            </div>
        </div>
    </div>
    </div>

    <style>
        [data-theme="light"] .hero-subtitle {
            color: var(--text-secondary) !important;
            text-shadow: none !important;
        }
    </style>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Material Type - HotelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Variables inherited from sidebar fragment */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--border-sidebar);
            padding: 2.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--bg-body);
            border: 1px solid var(--border-sidebar);
            border-radius: 1rem;
            color: var(--text-main);
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            font-family: inherit;
            font-size: 1rem;
            width: 100%;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .alert-setting {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid var(--border-sidebar);
            margin-bottom: 1.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .status-low {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        .status-danger {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }

        .status-safe {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('raw-materials')}"></div>

    <div class="main-content">
        <div class="container">
            <div style="margin-bottom: 2.5rem; display: flex; align-items: center; gap: 1rem;">
                <a th:href="@{/inventory/raw-materials/categories}"
                    style="color: var(--text-muted); text-decoration: none;">
                    <i data-lucide="arrow-left"></i>
                </a>
                <h2 style="margin: 0; font-size: 1.8rem; font-weight: 700;">Edit Material Type</h2>
            </div>

            <div class="card">
                <form th:action="@{'/inventory/raw-materials/categories/edit/' + ${category.id}}"
                    th:object="${category}" method="POST">
                    <div class="form-group">
                        <label for="name">Type Name</label>
                        <input type="text" id="name" th:field="*{name}" class="form-control" required>
                    </div>

                    <div class="alert-setting">
                        <span class="status-badge status-low">Low Stock Status</span>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Flag as "Low Stock" when quantity is between this limit and the "Out of Stock"
                                limit:</label>
                            <input type="number" th:field="*{lowStockThreshold}" class="form-control" required>
                        </div>
                    </div>

                    <div class="alert-setting">
                        <span class="status-badge status-danger">Out of Stock Status</span>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Flag as "Out of Stock" when quantity is strictly below:</label>
                            <input type="number" th:field="*{outOfStockThreshold}" class="form-control" required>
                        </div>
                    </div>

                    <div class="alert-setting" style="border-style: dashed; opacity: 0.8;">
                        <span class="status-badge status-safe">In Stock Status</span>
                        <p style="margin: 0; font-size: 0.9rem; color: var(--text-muted);">
                            Items will remain as "In Stock" if quantity is above the Low Stock limit.
                        </p>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="save"></i> Update Material Type
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>

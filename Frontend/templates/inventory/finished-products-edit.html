<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - HotelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Variables inherited from sidebar fragment */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            margin-bottom: 2.5rem;
            text-align: left;
            width: 100%;
        }

        .header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--border-sidebar);
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-body);
            border: 1px solid var(--border-sidebar);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-primary {
            background: var(--grad-inventory);
            color: white;
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-sidebar);
            color: var(--text-muted);
            backdrop-filter: blur(8px);
        }

        .btn-secondary:hover {
            background: rgba(239, 68, 68, 0.05);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.1);
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('finished-products')}"></div>

    <div class="main-content">
        <div class="form-container">
            <div class="header">
                <h2>Edit Finished Product</h2>
                <div style="color: var(--text-muted);">Modify item details and stock levels</div>
            </div>

            <div class="card">
                <form th:action="@{'/inventory/finished-products/edit/' + ${product.id}}" method="post"
                    enctype="multipart/form-data">
                    <div class="form-group" th:if="${product.imagePath != null}">
                        <label>Current Photo</label>
                        <div
                            style="margin-bottom: 1rem; border-radius: 1rem; overflow: hidden; border: 1px solid var(--border); width: 120px; height: 120px;">
                            <img th:src="${product.imagePath}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="image">Update Photo</label>
                        <input type="file" id="image" name="image" class="form-control" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label for="name">Item Name</label>
                        <input type="text" id="name" name="name" class="form-control" th:value="${product.name}"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" class="form-control" required>
                            <option value="Garments" th:selected="${product.category == 'Garments'}">Elite Textiles & Linens</option>
                            <option value="Ironware" th:selected="${product.category == 'Ironware'}">Industrial Ironware & Hospitality Furniture</option>
                        </select>
                    </div>

                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label for="price">Price ($)</label>
                            <input type="number" id="price" name="price" class="form-control"
                                th:value="${product.price}" step="0.01" required>
                        </div>
                        <div>
                            <label for="discount">Discount (%)</label>
                            <input type="number" id="discount" name="discount" class="form-control"
                                th:value="${product.discount}" step="1" min="0" max="100" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="quantity">Quantity available</label>
                        <input type="number" id="quantity" name="quantity" class="form-control"
                            th:value="${product.quantity}" required>
                    </div>

                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label for="customerName">Customer Name (Optional)</label>
                            <input type="text" id="customerName" name="customerName" class="form-control"
                                placeholder="e.g. John Doe">
                        </div>
                        <div>
                            <label for="remarks">Movement Remarks (Optional)</label>
                            <input type="text" id="remarks" name="remarks" class="form-control"
                                placeholder="e.g. Bulk order delivery...">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" class="form-control" rows="3"
                            th:text="${product.description}"></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="margin-top: 0;">
                            <i data-lucide="save"></i>
                            Update Product
                        </button>
                        <a th:href="@{/inventory/finished-products}" class="btn btn-secondary" style="margin-top: 0;">
                            <i data-lucide="x-circle" size="18"></i>
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>

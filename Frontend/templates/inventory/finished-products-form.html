<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Finished Product - HotelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Variables inherited from sidebar fragment */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            margin-bottom: 2.5rem;
            text-align: left;
            width: 100%;
        }

        .header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--border-sidebar);
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-body);
            border: 1px solid var(--border-sidebar);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-sidebar);
            color: var(--text-muted);
            margin-top: 0.75rem;
            backdrop-filter: blur(4px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--text-muted);
            color: var(--text);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('finished-products')}"></div>

    <div class="main-content">
        <div class="form-container">
            <div class="header">
                <h2>Add Finished Product</h2>
                <div style="color: var(--text-muted);">Include a new item to the inventory stock</div>
            </div>

            <div class="card">
                <form th:action="@{/inventory/finished-products/new}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="image">Item Photo</label>
                        <input type="file" id="image" name="image" class="form-control" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label for="name">Item Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Hotel Chairs"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" class="form-control" required>
                            <option value="" disabled selected>Select a section...</option>
                            <option value="Garments">Elite Textiles & Linens</option>
                            <option value="Ironware">Industrial Ironware & Hospitality Furniture</option>
                        </select>
                    </div>



                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label for="price">Price ($)</label>
                            <input type="number" id="price" name="price" class="form-control" placeholder="e.g. 200.00"
                                step="0.01" required>
                        </div>
                        <div>
                            <label for="discount">Discount (%)</label>
                            <input type="number" id="discount" name="discount" class="form-control" value="0" step="1"
                                min="0" max="100" required>
                        </div>
                    </div>

                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label for="quantity">Initial Quantity</label>
                            <input type="number" id="quantity" name="quantity" class="form-control"
                                placeholder="e.g. 100" required>
                        </div>
                        <div>
                            <label for="customerName">Ordering Customer (Optional)</label>
                            <input type="text" id="customerName" name="customerName" class="form-control"
                                placeholder="e.g. Grand Hotel">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <textarea id="description" name="description" class="form-control" rows="3"
                            placeholder="Additional details..."></textarea>
                    </div>

                    <!-- Mandatory Materials Section -->
                    <div
                        style="margin: 2rem 0; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 1rem; border: 1px dashed var(--border-sidebar);">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <h3 style="margin: 0; font-size: 1rem; color: var(--accent);">Required Material Types (BOM)
                            </h3>
                            <button type="button" onclick="addMaterialRow()" class="btn"
                                style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: rgba(99, 102, 241, 0.1); color: var(--primary); border: 1px solid var(--primary); width: auto;">
                                <i data-lucide="plus" size="14"></i> Add Material
                            </button>
                        </div>

                        <div th:if="${error}"
                            style="color: #f87171; font-size: 0.85rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                            <i data-lucide="alert-circle" size="14"></i>
                            <span th:text="${error}"></span>
                        </div>

                        <div id="materials-container">
                            <!-- Dynamic rows will be here -->
                        </div>

                        <p id="no-materials-msg"
                            style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin: 1rem 0;">
                            At least one material must be added for production.
                        </p>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="plus-circle"></i>
                        Add Product
                    </button>
                    <a th:href="@{/inventory/finished-products}" class="btn btn-secondary">
                        <i data-lucide="arrow-left" size="18"></i>
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>

    <!-- Hidden Template for JS -->
    <template id="material-row-template">
        <div class="material-row"
            style="display: grid; grid-template-columns: 1fr 100px 40px; gap: 0.75rem; margin-bottom: 0.75rem; align-items: center;">
            <select name="materialIds" class="form-control" required>
                <option value="">Select Material Type (e.g. Glass/Wetllok)...</option>
                <option th:each="m : ${allMaterials}" th:value="${m.id}"
                    th:text="${m.name + (m.category != null ? ' (' + m.category + ')' : '')}"></option>
            </select>
            <input type="number" name="materialQuantities" class="form-control" placeholder="Qty" min="1" required>
            <button type="button" onclick="this.parentElement.remove(); checkEmpty();"
                style="background: none; border: none; color: #ef4444; cursor: pointer; padding: 0;">
                <i data-lucide="x-circle" size="20"></i>
            </button>
        </div>
    </template>

    <script>
        lucide.createIcons();

        function addMaterialRow() {
            const container = document.getElementById('materials-container');
            const template = document.getElementById('material-row-template');
            const clone = template.content.cloneNode(true);
            container.appendChild(clone);
            lucide.createIcons();
            checkEmpty();
        }

        function checkEmpty() {
            const container = document.getElementById('materials-container');
            const msg = document.getElementById('no-materials-msg');
            msg.style.display = container.children.length === 0 ? 'block' : 'none';
        }

        // Add first row by default
        addMaterialRow();
    </script>
</body>

</html>

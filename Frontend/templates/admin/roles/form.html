<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editMode ? 'Edit Role' : 'Add New Role'} + ' - HotelCraft'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Variables inherited from sidebar fragment */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        .header {
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-sidebar);
            max-width: 800px;
            margin: 0 auto;
            transition: all 0.3s;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-body);
            border: 1px solid var(--border-sidebar);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .permissions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 0.5rem;
            background: var(--nav-item-hover-bg);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-sidebar);
        }

        .perm-check {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 0.4rem;
            transition: background 0.2s;
        }

        .perm-check:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .perm-check input {
            width: auto;
            margin-right: 0.75rem;
        }

        .perm-check span {
            font-size: 0.8125rem;
            color: var(--text);
            font-weight: 500;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.875rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-primary {
            background: var(--grad-users);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-sidebar);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        /* Cleanup legacy logout btn */
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('roles')}"></div>

    <div class="main-content">
        <div class="header">
            <h2 th:text="${editMode ? 'Edit Role' : 'Add New Role'}"></h2>
            <div style="color: var(--text-muted);"
                th:text="${editMode ? 'Edit role name and assignable permissions' : 'Create a new role and define its access scope'}">
            </div>
        </div>

        <div class="card">
            <form th:action="${editMode ? '/admin/roles/' + roleDto.id + '/edit' : '/admin/roles/new'}"
                th:object="${roleDto}" method="post">
                <input type="hidden" th:field="*{id}" th:if="${editMode}">

                <div class="form-group">
                    <label>Role Name (e.g., ROLE_PRODUCTION_MANAGER)</label>
                    <input type="text" th:field="*{name}" placeholder="ROLE_XXXX" required>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Note: Roles must start
                        with 'ROLE_' to be recognized by the security system.</p>
                </div>

                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;">Assigned Permissions</label>
                        <a th:href="@{/admin/permissions}"
                            style="font-size: 0.75rem; color: var(--primary); text-decoration: none; font-weight: 600;">+
                            Manage Permissions</a>
                    </div>
                    <div class="permissions-grid">
                        <label th:each="perm : ${allPermissions}" class="perm-check">
                            <input type="checkbox" th:field="*{permissionIds}" th:value="${perm.id}">
                            <span th:text="${perm.name}"></span>
                        </label>
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <a th:href="@{/admin/roles}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary"
                        th:text="${editMode ? 'Update Role' : 'Save Role'}"></button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>

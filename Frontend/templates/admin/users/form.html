<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editMode ? 'Edit User' : 'Add New User'} + ' - HotelCraft'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Variables inherited from sidebar fragment */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        .header {
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-sidebar);
            max-width: 600px;
            margin: 0 auto;
            transition: all 0.3s;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-body);
            border: 1px solid var(--border-sidebar);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .roles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
            background: var(--nav-item-hover-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-sidebar);
        }

        .role-check {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .role-check input {
            width: auto;
            margin-right: 0.5rem;
        }

        .role-check span {
            font-size: 0.875rem;
            color: var(--text);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.875rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-primary {
            background: var(--grad-users);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-sidebar);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .error-text {
            color: #fca5a5;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        /* Cleanup legacy logout btn */
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>

    <div class="main-content">
        <div class="header">
            <h2 th:text="${editMode ? 'Edit User' : 'Add New User'}"></h2>
            <div style="color: var(--text-muted);"
                th:text="${editMode ? 'Update account details and role access' : 'Create a new account and assign roles'}">
            </div>
        </div>

        <div class="card">
            <form th:action="${editMode ? '/admin/users/' + userDto.id + '/edit' : '/admin/users/new'}"
                th:object="${userDto}" method="post">
                <input type="hidden" th:field="*{id}" th:if="${editMode}">

                <div class="form-grid">
                    <div class="form-group full">
                        <label>Full Name</label>
                        <input type="text" th:field="*{fullName}" placeholder="Enter full name" required>
                        <div class="error-text" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" th:field="*{email}" placeholder="email@example.com" required>
                        <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone" th:field="*{phone}" placeholder="+94 771234567"
                            pattern="^\+94\d{9}$" maxlength="12">
                        <div id="phone-error" class="error-text" style="display:none;"></div>
                    </div>

                    <div class="form-group full">
                        <label>Address</label>
                        <input type="text" th:field="*{address}" placeholder="Enter physical address">
                    </div>

                    <div class="form-group full" sec:authorize="hasRole('ADMIN')">
                        <label>Assigned Roles</label>
                        <div class="roles-container">
                            <label th:each="role : ${roles}" class="role-check">
                                <input type="checkbox" th:field="*{roleIds}" th:value="${role.id}">
                                <span th:text="${role.name}"></span>
                            </label>
                        </div>
                        <div class="error-text" th:if="${#fields.hasErrors('roleIds')}" th:errors="*{roleIds}"></div>
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <a th:href="@{/admin/users}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary"
                        th:text="${editMode ? 'Update User' : 'Save User'}"></button>
                </div>
            </form>
        </div>
    </div>
    <script>
        const phoneInput = document.getElementById('phone');
        const phoneError = document.getElementById('phone-error');

        // Initialize prefix if empty
        if (!phoneInput.value) {
            phoneInput.value = '+94';
        }

        function validatePhone() {
            const val = phoneInput.value;
            const suffix = val.substring(3);

            if (suffix.length > 0 && !/^\d+$/.test(suffix)) {
                phoneError.textContent = 'Only numbers are allowed after +94';
                phoneError.style.display = 'block';
                phoneInput.style.borderColor = '#ef4444';
                return false;
            } else if (suffix.length > 0 && suffix.length !== 9) {
                phoneError.textContent = 'Exactly 9 digits are required';
                phoneError.style.display = 'block';
                phoneInput.style.borderColor = '#ef4444';
                return false;
            } else {
                phoneError.style.display = 'none';
                phoneInput.style.borderColor = '';
                return true;
            }
        }

        phoneInput.addEventListener('input', function (e) {
            // Force prefix
            if (!this.value.startsWith('+94')) {
                this.value = '+94' + this.value.replace(/^\+?9?4?/, '');
            }
            validatePhone();
        });

        phoneInput.addEventListener('keydown', function (e) {
            // Prevent deleting +94 prefix
            if ((e.key === 'Backspace' || e.key === 'Delete') && this.selectionStart <= 3 && this.selectionEnd <= 3) {
                e.preventDefault();
            }
        });

        // Initialize validation state
        if (phoneInput.value.length > 3) validatePhone();
    </script>
</body>

</html>
